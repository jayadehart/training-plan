name: Generate Workout

on:
  schedule:
    # Tue + Thu at 13:00 UTC (~9am ET / 6am PT — adjust to your timezone)
    - cron: "0 13 * * 2,4"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run without sending email or persisting state"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: workout-generate
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate workout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_TRACING: "true"
          LANGSMITH_PROJECT: training-plan
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            pnpm run generate -- --dry-run
          else
            pnpm run generate
          fi

      - name: Commit state.db
        if: ${{ inputs.dry-run != true }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "workout state for ${{ github.run_id }}"
          file_pattern: "data/state.db"
